<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <title>Simone's blog</title>
  <meta name="description" content="Personal blog with articles, notes, experiments, and thoughts.">

  <!-- TODO: update this once with the final domain -->
  <link rel="canonical" href="https://example.com/">

  <!-- RSS feed -->
  <link
    rel="alternate"
    type="application/rss+xml"
    title="My Blog RSS Feed"
    href="/feed.xml">

  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <header class="site-header">
    <h1 class="site-title">
      <a href="/">Bits and bytes</a>
    </h1>

    <p class="site-description">
      Hi. I'm Simone, a developer as there are many, with a deep passion for software.
    </p>

  </header>

  <main id="content">
    <section aria-labelledby="articles-heading">
      <h2 id="articles-heading">Articles</h2>

      <ol class="article-list">
        <li class="article-item">
          <article>
            <h3 class="article-title">
              <a href="/articles/example-article.html">
                My First Post
              </a>
            </h3>

            <p class="article-meta">
              <time datetime="2026-05-16">
                2026-05-16
              </time>
            </p>

            <p class="article-summary">
              Short optional summary of the article.
            </p>
          </article>
        </li>

      </ol>
    </section>
  </main>

</body>
</html>
